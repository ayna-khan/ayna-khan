name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:  
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake game from GitHub contribution grid
        uses: platane/snk@v3
        with:
          github_user_name: ayna-khan
          outputs: |
            dist/github-snake.svg?color_snake=#ff9900,#ff6600,#cc3300&color_dots=#f0f0f0,#ffe0b3,#ffb366,#ff8c1a,#e65c00
            dist/github-snake-dark.svg?color_snake=#39d353,#26a641,#006d32&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353&palette=github-dark
      
      - name: Push snake svg to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
