name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake game from GitHub contribution grid
        uses: platane/snk@v3
        with:
          github_user_name: ayna-khan
          outputs: |
            dist/github-snake.svg?color_snake=#fca103,#e08e00,#b06b00&color_dots=#161b22,#3d0a5c,#5c0f8a,#7503c2,#8803fc
            dist/github-snake-dark.svg?color_snake=#fca103,#e08e00,#b06b00&color_dots=#161b22,#3d0a5c,#5c0f8a,#7503c2,#8803fc

      - name: Push snake svg to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
